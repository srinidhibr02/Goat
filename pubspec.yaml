name: goat
description: "GOAT - Guide Of All Temples"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.7
  firebase_analytics: ^11.4.2
  firebase_crashlytics: ^4.3.2
  google_sign_in: ^6.2.1
  flutter_local_notifications: ^17.1.2

  # Network
  dio: ^5.8.0+1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.0

  # Code Generation Annotations
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^3.0.3
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo/
    - assets/data/
